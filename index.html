<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadaraAnimez | No Ads</title>
    <style>
        :root { --main-red: #ff3131; --dark-bg: #0a0a0a; --card-bg: #161616; --nav-bg: #111; }
        body { background: var(--dark-bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        nav { background: var(--nav-bg); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--main-red); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--main-red); }
        #searchInput { padding: 10px 20px; border-radius: 20px; border: 1px solid #333; width: 300px; background: #1c1c1c; color: white; outline: none; }

        .main-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .video-wrapper { background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #222; box-shadow: 0 10px 40px rgba(255, 49, 49, 0.2); }
        video { width: 100%; display: block; aspect-ratio: 16/9; background: #000; }

        .selector-box { background: #111; padding: 20px; margin-top: 15px; border-radius: 8px; border: 1px solid #222; }
        .section-label { color: #888; font-weight: bold; font-size: 14px; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .section-label:first-child { margin-top: 0; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; }
        .ep-btn { background: #222; color: #ccc; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid #333; font-weight: bold; text-align: center; }
        .ep-btn:hover { background: #333; color: white; }
        .ep-btn.active { background: var(--main-red); color: white; border-color: var(--main-red); }

        .grid-section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .anime-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; position: relative; }
        .anime-card:hover { transform: translateY(-8px); border-color: var(--main-red); }
        .anime-card img { width: 100%; height: 300px; object-fit: cover; display: block; }
        
        .card-info { padding: 15px; text-align: center; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--main-red); font-size: 11px; padding: 4px 8px; border-radius: 5px; font-weight: bold; z-index: 5; }
        h2 { border-left: 4px solid var(--main-red); padding-left: 15px; text-transform: uppercase; font-size: 1.1rem; margin: 15px 0; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MADARA<span>ANIMEZ</span></div>
    <input type="text" id="searchInput" placeholder="Search library..." onkeyup="searchAnime()">
</nav>

<div class="main-container">
    <h2 id="currentTitle">Select an Anime Below</h2>
    <div class="video-wrapper">
        <video id="mainPlayer" controls>
            <source id="videoSource" src="" type="video/mp4">
        </video>
    </div>

    <div class="selector-box" id="selectorBox" style="display:none;">
        <div id="s1Section">
            <div class="section-label" id="sectionLabel1">Season 1</div>
            <div class="ep-grid" id="s1Grid"></div>
        </div>
        <div id="s2Section" style="display:none;">
            <div class="section-label">Season 2</div>
            <div class="ep-grid" id="s2Grid"></div>
        </div>
        <div id="ovaSection" style="display:none;">
            <div class="section-label">OVA</div>
            <div class="ep-grid" id="ovaGrid"></div>
        </div>
    </div>
</div>

<div class="grid-section">
    <h2>Your Library</h2>
    <div class="anime-grid" id="animeGrid">
        
        <!-- SBR CARD -->
        <div class="anime-card" onclick="loadSeries('Steel Ball Run JoJo', ['jojo.mp4'], [], [])">
            <span class="badge" style="background:#ffcc00; color:#000;">PART 7</span>
            <img src="SteelBallRun.jfif" alt="SBR">
            <div class="card-info"><h3>Steel Ball Run JoJo</h3></div>
        </div>

        <!-- KONOSUBA CARD -->
        <div class="anime-card" onclick="loadSeries('Konosuba', 
            ['konosuba.mp4','konosuba2.mp4','konosuba3.mp4','konosuba4.mp4','konosuba5.mp4','konosuba6.mp4','konosuba7.mp4','konosuba8.mp4','konosuba9.mp4','konosuba10.mp4'], 
            ['konosubas2ep1.mp4','konosubas2ep2.mp4','konosubas2ep3.mp4','konosubas2ep4.mp4','konosubas2ep5.mp4','konosubas2ep6.mp4','konosubas2ep7.mp4','konosubas2ep8.mp4','konosubas2ep9.mp4','konosubas2ep10.mp4'], 
            ['konosuba11OVA.mp4', 'konosuba11S2OVA.mp4'])">
            <span class="badge" style="background:#00a2ff;">S1 + S2 + OVA</span>
            <img src="konosuba.jfif" alt="Konosuba">
            <div class="card-info"><h3>Konosuba</h3></div>
        </div>

        <!-- HIGH SCHOOL DXD CARD -->
        <div class="anime-card" onclick="loadSeries('High School DxD', ['DxD.mp4','DxD2.mp4','DxD3.mp4','DxD4.mp4','DxD5.mp4','DxD6.mp4','DxD7.mp4','DxD8.mp4','DxD9.mp4','DxD10.mp4','DxD11.mp4','DxD12.mp4'], [], [])">
            <span class="badge" style="background:#ff3131;">12 EPS</span>
            <!-- Uses your local Dxd.jfif file -->
            <img src="Dxd.jfif" alt="DxD">
            <div class="card-info"><h3>High School DxD</h3></div>
        </div>

    </div>
</div>

<script>
    function loadSeries(name, s1Files, s2Files, ovaFiles) {
        const selectorBox = document.getElementById('selectorBox');
        const s1Grid = document.getElementById('s1Grid');
        const s2Grid = document.getElementById('s2Grid');
        const s2Section = document.getElementById('s2Section');
        const ovaGrid = document.getElementById('ovaGrid');
        const ovaSection = document.getElementById('ovaSection');
        const sectionLabel1 = document.getElementById('sectionLabel1');
        
        selectorBox.style.display = "block";
        s1Grid.innerHTML = "";
        s2Grid.innerHTML = "";
        ovaGrid.innerHTML = "";

        sectionLabel1.innerText = s2Files.length > 0 ? "Season 1" : "Episodes";
        
        s1Files.forEach((file, index) => {
            const btn = createEpButton(file, name + (s2Files.length > 0 ? " S1" : "") + " - Ep " + (index + 1), index + 1);
            if (index === 0) btn.classList.add('active');
            s1Grid.appendChild(btn);
        });

        if (s2Files.length > 0) {
            s2Section.style.display = "block";
            s2Files.forEach((file, index) => {
                const btn = createEpButton(file, name + " S2 - Ep " + (index + 1), index + 1);
                s2Grid.appendChild(btn);
            });
        } else { s2Section.style.display = "none"; }

        if (ovaFiles.length > 0) {
            ovaSection.style.display = "block";
            ovaFiles.forEach((file, index) => {
                const label = index === 0 && ovaFiles.length > 1 ? "S1 OVA" : (index === 1 ? "S2 OVA" : "OVA");
                const btn = createEpButton(file, name + " " + label, label);
                ovaGrid.appendChild(btn);
            });
        } else { ovaSection.style.display = "none"; }

        playVideo(s1Files[0], name + (s2Files.length > 0 ? " S1" : "") + " - Ep 1");
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function createEpButton(file, title, label) {
        const btn = document.createElement('div');
        btn.className = "ep-btn";
        btn.innerText = label;
        btn.onclick = function() {
            playVideo(file, title);
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        return btn;
    }

    function playVideo(file, title) {
        const player = document.getElementById('mainPlayer');
        const source = document.getElementById('videoSource');
        const titleDisplay = document.getElementById('currentTitle');
        source.src = file;
        titleDisplay.innerText = "Now Playing: " + title;
        player.load();
        player.play();
    }

    function searchAnime() {
        let query = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.querySelectorAll('.anime-card');
        cards.forEach(card => {
            let title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(query) ? "block" : "none";
        });
    }
</script>

</body>
</html>

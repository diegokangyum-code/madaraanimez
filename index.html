    <style>
        :root {
            --primary: #a12cf4;
            --bg-body: #050506;
            --bg-nav: #0f1014;
            --bg-card: #16181f;
            --border: #262a35;
            --text-main: #ffffff;
            --text-muted: #8a8e99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .wrapper { max-width: 1500px; margin: 0 auto; padding: 0 20px; }

        /* AUTH MODAL */
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--bg-nav); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .auth-card input { width: 100%; background: #1f222b; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; background: var(--primary); color: #fff; padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; }

        /* HEADER */
        header { background: var(--bg-nav); padding: 15px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: #fff; font-family: 'Poppins'; }
        .logo span { color: var(--primary); }

        .search-container { position: relative; width: 400px; }
        .search-container input { width: 100%; background: #1f222b; border: 1px solid var(--border); padding: 10px 15px 10px 45px; border-radius: 10px; color: #fff; outline: none; }
        .search-container i { position: absolute; left: 15px; top: 13px; color: var(--text-muted); }

        .login-trigger { background: var(--primary); color: #fff; padding: 8px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 13px; }

        /* HERO AREA */
        .hero { height: 450px; position: relative; background-size: cover; background-position: center top; display: flex; align-items: center; border-bottom: 4px solid var(--primary); margin-bottom: 40px; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, #050506 30%, rgba(5,5,6,0) 100%); }
        .hero-data { position: relative; z-index: 10; max-width: 700px; padding-left: 5%; }
        .hero-title { font-size: 50px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; font-family: 'Poppins'; }
        .btn-play { background: var(--primary); color: white; padding: 15px 35px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-size: 16px; }

        /* PLAYER SECTION */
        #watch-section { display: none; margin-bottom: 50px; }
        .player-wrapper { background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--border); aspect-ratio: 16/9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .player-bar { background: var(--bg-nav); padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); border-top: none; border-radius: 0 0 20px 20px; }
        .server-btn { background: #1f222b; color: var(--text-muted); padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 800; cursor: pointer; margin-left: 10px; }
        .server-btn.active { background: var(--primary); color: #fff; }

        /* EPISODES */
        .ep-box { background: var(--bg-card); border-radius: 15px; margin-top: 25px; padding: 25px; border: 1px solid var(--border); }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .ep-item { background: #1f222b; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 700; border: 1px solid var(--border); }
        .ep-item.active { background: var(--primary); border-color: var(--primary); }

        /* ANIME GRID */
        .grid-header { font-size: 26px; font-weight: 800; margin-bottom: 30px; border-left: 6px solid var(--primary); padding-left: 15px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .anime-card { background: var(--bg-card); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid var(--border); position: relative; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card-img { height: 300px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { padding: 15px; text-align: center; font-weight: 700; font-size: 14px; }
        .dub-tag { position: absolute; top: 15px; left: 15px; background: var(--primary); color: white; padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; z-index: 5; }

        footer { margin-top: 100px; padding: 60px 0; background: var(--bg-nav); border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); }
    </style>
</head>

                { id: 83, title: "Saint Seiya", mal: "1254", img: "https://image.tmdb.org/t/p/w500/ss.jpg", s1: 114, type: "anime" },
                { id: 84, title: "Sailor Moon", mal: "530", img: "https://image.tmdb.org/t/p/w500/sm.jpg", s1: 46, type: "anime" },
                { id: 85, title: "Initial D", mal: "185", img: "https://image.tmdb.org/t/p/w500/id.jpg", s1: 26, type: "anime" },
                { id: 86, title: "Great Teacher Onizuka", mal: "245", img: "https://image.tmdb.org/t/p/w500/gto.jpg", s1: 43, type: "anime" },
                { id: 87, title: "Slam Dunk", mal: "170", img: "https://image.tmdb.org/t/p/w500/sd.jpg", s1: 101, type: "anime" },
                { id: 88, title: "Trigun", mal: "6", img: "https://image.tmdb.org/t/p/w500/tri.jpg", s1: 26, type: "anime" },
                { id: 89, title: "YuYu Hakusho", mal: "392", img: "https://image.tmdb.org/t/p/w500/yyh.jpg", s1: 112, type: "anime" },
                { id: 90, title: "Ouran High School", mal: "853", img: "https://image.tmdb.org/t/p/w500/ohs.jpg", s1: 26, type: "anime" },
                { id: 91, title: "Black Butler", mal: "4898", img: "https://image.tmdb.org/t/p/w500/bb.jpg", s1: 24, type: "anime" },
                { id: 92, title: "Fruits Basket", mal: "38680", img: "https://image.tmdb.org/t/p/w500/fb.jpg", s1: 25, type: "anime" },
                { id: 93, title: "Kaguya-sama", mal: "37999", img: "https://image.tmdb.org/t/p/w500/ks.jpg", s1: 12, type: "anime" },
                { id: 94, title: "Overlord", mal: "29803", img: "https://image.tmdb.org/t/p/w500/ol.jpg", s1: 13, type: "anime" },
                { id: 95, title: "Slime Isekai", mal: "37430", img: "https://image.tmdb.org/t/p/w500/sl.jpg", s1: 24, type: "anime" },
                { id: 96, title: "No Game No Life", mal: "19815", img: "https://image.tmdb.org/t/p/w500/ng.jpg", s1: 12, type: "anime" },
                { id: 97, title: "Your Name (Movie)", tmdb: "372058", img: "https://image.tmdb.org/t/p/w500/yn.jpg", s1: 1, type: "movie" },
                { id: 98, title: "Spirited Away", tmdb: "129", img: "https://image.tmdb.org/t/p/w500/sa.jpg", s1: 1, type: "movie" },
                { id: 99, title: "Akira", tmdb: "149", img: "https://image.tmdb.org/t/p/w500/ak.jpg", s1: 1, type: "movie" },
                { id: 100, title: "The Seven Deadly Sins", mal: "23755", img: "https://image.tmdb.org/t/p/w500/7ds.jpg", s1: 24, type: "anime" }
            ];

            let state = { active: database[0], ep: 1, szn: 's1', server: 'to' };

            const init = () => {
                renderGrid(database);
                setHero(database[0]);
                Auth.check();
            };

            const renderGrid = (list) => {
                document.getElementById('main-grid').innerHTML = list.map(item => `
                    <div class="anime-card" onclick="Engine.loadAnime(${item.id})">
                        <div class="dub-tag">DUB</div>
                        <div class="card-img"><img src="${item.img}" onerror="this.src='https://via.placeholder.com/200x300?text=${item.title}'"></div>
                        <div class="card-details">${item.title}</div>
                    </div>
                `).join('');
            };

            const setHero = (anime) => {
                state.active = anime;
                document.getElementById('hero-title').innerText = anime.title;
                document.getElementById('hero-banner').style.backgroundImage = `url('${anime.img}')`;
            };

            const loadAnime = (id) => {
                const anime = database.find(x => x.id === id);
                state.active = anime;
                state.ep = 1; state.szn = 's1';
                document.getElementById('hero-banner').style.display = "none";
                document.getElementById('watch-section').style.display = "block";
                document.getElementById('playing-title').innerText = anime.title;
                
                const p = document.getElementById('season-picker');
                p.innerHTML = `<option value="s1">Season 1</option>`;
                if(anime.s2) p.innerHTML += `<option value="s2">Season 2</option>`;
                if(anime.s3) p.innerHTML += `<option value="s3">Season 3</option>`;
                if(anime.s4) p.innerHTML += `<option value="s4">Season 4</option>`;

                renderEpisodes(anime.s1);
                updateStream(1);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };

            const renderEpisodes = (count) => {
                const grid = document.getElementById('ep-grid');
                grid.innerHTML = "";
                for(let i = 1; i <= count; i++) {
                    grid.innerHTML += `<div class="ep-item ${i===1?'active':''}" id="ep-link-${i}" onclick="Engine.updateStream(${i})">${i}</div>`;
                }
            };

            const updateStream = (ep) => {
                state.ep = ep;
                const iframe = document.getElementById('main-player');
                const loader = document.getElementById('player-loader');
                const sznNum = state.szn.replace('s', '');

                loader.style.display = "flex";
                document.getElementById('playing-ep').innerText = "EPISODE " + ep + " [DUB]";
                document.querySelectorAll('.ep-item').forEach(el => el.classList.remove('active'));
                if(document.getElementById(`ep-link-${ep}`)) document.getElementById(`ep-link-${ep}`).classList.add('active');

                let finalUrl = "";

                // THE V11 SMART-ROUTE FIX
                if (state.active.type === "anime") {
                    // For Anime: Use the /anime/ route and the MAL ID
                    finalUrl = `https://vidsrc.to/embed/anime/${state.active.mal}/${ep}`;
                } else if (state.active.type === "tv") {
                    // For Western TV: Use the /tv/ route and the TMDB ID
                    finalUrl = `https://vidsrc.to/embed/tv/${state.active.tmdb}/${sznNum}/${ep}`;
                } else {
                    // For Movies
                    finalUrl = `https://vidsrc.to/embed/movie/${state.active.tmdb}`;
                }

                iframe.src = finalUrl;
                setTimeout(() => { loader.style.display = "none"; }, 1500);
            };

            const switchServer = (srv, el) => {
                state.server = srv;
                document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
                el.classList.add('active');
                updateStream(state.ep);
            };

            const search = () => {
                const q = document.getElementById('search-box').value.toLowerCase();
                renderGrid(database.filter(x => x.title.toLowerCase().includes(q)));
            };

            const changeSeason = () => {
                state.szn = document.getElementById('season-picker').value;
                renderEpisodes(state.active[state.szn]);
                updateStream(1);
            };

            return { init, loadAnime, updateStream, switchServer, search, changeSeason, startHero: () => loadAnime(state.active.id) };
        })();

        Engine.init();
    </script>
</body>
</html>

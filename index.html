<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadaraAnimez | Dubbed HD Streaming</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #a12cf4;
            --bg-body: #050506;
            --bg-nav: #0f1014;
            --bg-card: #16181f;
            --border: #262a35;
            --text-main: #ffffff;
            --text-muted: #8a8e99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .wrapper { max-width: 1500px; margin: 0 auto; padding: 0 20px; }

        /* AUTH MODAL */
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--bg-nav); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .auth-card input { width: 100%; background: #1f222b; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; background: var(--primary); color: #fff; padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; }

        /* HEADER */
        header { background: var(--bg-nav); padding: 15px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: #fff; font-family: 'Poppins'; }
        .logo span { color: var(--primary); }

        .search-container { position: relative; width: 400px; }
        .search-container input { width: 100%; background: #1f222b; border: 1px solid var(--border); padding: 10px 15px 10px 45px; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary); }
        .search-container i { position: absolute; left: 15px; top: 13px; color: var(--text-muted); }

        .user-area { display: flex; align-items: center; gap: 15px; }
        .btn-login { background: var(--primary); color: #fff; padding: 8px 18px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 13px; }

        /* HERO AREA */
        .hero { height: 450px; position: relative; background-size: cover; background-position: center top; display: flex; align-items: center; border-bottom: 4px solid var(--primary); margin-bottom: 40px; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, #050506 30%, rgba(5,5,6,0) 100%); }
        .hero-data { position: relative; z-index: 10; max-width: 700px; padding-left: 5%; }
        .hero-title { font-size: 50px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; font-family: 'Poppins'; }
        .btn-play { background: var(--primary); color: white; padding: 15px 35px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-size: 16px; }

        /* PLAYER SECTION */
        #watch-section { display: none; margin-bottom: 50px; }
        .player-wrapper { background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--border); aspect-ratio: 16/9; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        iframe { width: 100%; height: 100%; border: none; }
        .player-bar { background: var(--bg-nav); padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); border-top: none; border-radius: 0 0 20px 20px; }
        .server-btn { background: #1f222b; color: var(--text-muted); padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 800; cursor: pointer; margin-left: 10px; border: 1px solid transparent; }
        .server-btn.active { background: var(--primary); color: #fff; }

        /* EPISODES */
        .ep-box { background: var(--bg-card); border-radius: 15px; margin-top: 25px; padding: 25px; border: 1px solid var(--border); }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .ep-item { background: #1f222b; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 700; border: 1px solid var(--border); transition: 0.2s; }
        .ep-item:hover { border-color: var(--primary); }
        .ep-item.active { background: var(--primary); border-color: var(--primary); }

        /* ANIME GRID */
        .grid-header { font-size: 26px; font-weight: 800; margin-bottom: 30px; border-left: 6px solid var(--primary); padding-left: 15px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .anime-card { background: var(--bg-card); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid var(--border); position: relative; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .card-img { height: 260px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { padding: 15px; text-align: center; font-weight: 700; font-size: 14px; color: #fff; }
        .dub-tag { position: absolute; top: 12px; left: 12px; background: var(--primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; z-index: 5; }

        footer { margin-top: 100px; padding: 60px 0; background: var(--bg-nav); border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>

    <!-- AUTH SYSTEM -->
    <div class="auth-overlay" id="auth-modal">
        <div class="auth-card">
            <h2 id="modal-title">Member Access</h2>
            <input type="text" id="auth-user" placeholder="Create Username">
            <input type="password" id="auth-pass" placeholder="Create Password">
            <button class="auth-btn" onclick="Auth.execute()">Join MadaraAnimez</button>
            <p style="margin-top: 15px; font-size: 12px; color: red; cursor: pointer;" onclick="Auth.close()">Close</p>
        </div>
    </div>

    <header>
        <div class="wrapper header-inner">
            <a href="#" class="logo" onclick="location.reload()">MADARA<span>ANIMEZ</span></a>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-box" placeholder="Search dubbed titles..." onkeyup="Engine.search()">
            </div>
            <div class="user-area" id="user-display">
                <div class="btn-login" onclick="Auth.open()">Login / Sign Up</div>
            </div>
        </div>
    </header>

    <section class="hero" id="hero-banner">
        <div class="hero-data">
            <h1 class="hero-title" id="hero-title">One Piece</h1>
            <p id="hero-desc" style="color: #ccc; margin-bottom: 20px;">V15 Update: All Custom IDs Syncing. Dubbed Focus Active.</p>
            <button class="btn-play" onclick="Engine.startHero()"><i class="fas fa-play"></i> Watch Now</button>
        </div>
    </section>

    <main class="wrapper">
        <section id="watch-section">
            <div class="player-wrapper">
                <iframe id="main-player" src="" allowfullscreen allow="autoplay"></iframe>
            </div>

            <div class="player-bar">
                <div>
                    <h2 id="playing-title">Title</h2>
                    <span id="playing-ep" style="color: var(--primary); font-weight: 800;">EPISODE 1 [DUB]</span>
                </div>
                <div style="display: flex;">
                    <div class="server-btn active" onclick="Engine.switchServer('me', this)">SERVER 1</div>
                    <div class="server-btn" onclick="Engine.switchServer('cc', this)">SERVER 2</div>
                </div>
            </div>

            <div class="ep-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Episode List</h3>
                    <select id="season-picker" onchange="Engine.changeSeason()" style="background: #1f222b; color: white; border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px;">
                        <option value="s1">Season 1</option>
                    </select>
                </div>
                <div class="ep-grid" id="ep-grid"></div>
            </div>
        </section>

        <h2 class="grid-header" id="grid-label">Master Dubbed Library</h2>
        <div class="anime-grid" id="main-grid"></div>
    </main>

    <footer>
        <h2 class="logo">MADARA<span>ANIMEZ</span></h2>
        <p>Your Ultimate Portal for English Dubbed HD Content</p>
    </footer>

    <script>
        const Auth = (() => {
            const open = () => document.getElementById('auth-modal').style.display = 'flex';
            const close = () => document.getElementById('auth-modal').style.display = 'none';
            const execute = () => {
                const user = document.getElementById('auth-user').value;
                if(user.length < 2) return alert("Enter a valid name");
                localStorage.setItem('madara_auth', user);
                location.reload();
            };
            const check = () => {
                const user = localStorage.getItem('madara_auth');
                if(user) document.getElementById('user-display').innerHTML = `<span style="font-weight:800; color:var(--primary)">Hello, ${user}</span>`;
            };
            return { open, close, execute, check };
        })();

        const Engine = (() => {
            // DATABASE: Updated with requested Re:Zero and Blue Lock IDs
            const database = [
                { id: 1, title: "One Piece", tmdb: "37854", img: "onepiece.jfif", s1: 1100 },
                { id: 2, title: "Naruto", tmdb: "31910", img: "naruto.jfif", s1: 220 },
                { id: 3, title: "Solo Leveling", tmdb: "127532", img: "solo-leveling.jfif", s1: 12 },
                { id: 4, title: "Konosuba", tmdb: "65844", img: "konosuba.jfif", s1: 10, s2: 10, s3: 11 },
                { id: 5, title: "Invincible", tmdb: "95557", img: "invincible.jfif", s1: 8, s2: 8 },
                { id: 6, title: "Highschool DxD", tmdb: "45950", img: "Dxd.jfif", s1: 12, s2: 12, s3: 12, s4: 13 },
                { id: 7, title: "Tokyo Ghoul", tmdb: "61374", img: "tg.jpg", s1: 12, s2: 12 },
                { id: 8, title: "Vinland Saga", tmdb: "88803", img: "vs.jpg", s1: 24, s2: 24 },
                { id: 9, title: "Mob Psycho 100", tmdb: "67075", img: "mp.jpg", s1: 12, s2: 13, s3: 12 },
                { id: 10, title: "Jujutsu Kaisen", tmdb: "95479", img: "jjk.jfif", s1: 24, s2: 23 },
                { id: 11, title: "Steel Ball Run", tmdb: "45790", img: "SteelBallRun.jfif", s1: 24 },
                { id: 12, title: "Attack on Titan", tmdb: "1429", img: "https://image.tmdb.org/t/p/w500/hEkaBwk8mcyN9a8pE6o86lnuGvD.jpg", s1: 25, s2: 12 },
                { id: 13, title: "Demon Slayer", tmdb: "85937", img: "https://image.tmdb.org/t/p/w500/xUfSjsmFvGf6S7v9ws9oZ999IuN.jpg", s1: 26, s2: 18 },
                { id: 14, title: "Re:Zero", tmdb: "65942", img: "rezero.jfif", s1: 25, s2: 25 },
                { id: 15, title: "Blue Lock", tmdb: "131041", img: "bluelock.jfif", s1: 24 },
                { id: 16, title: "Dragon Ball Z", tmdb: "12971", img: "https://image.tmdb.org/t/p/w500/dbz.jpg", s1: 291 },
                { id: 17, title: "Bleach", tmdb: "30984", img: "https://image.tmdb.org/t/p/w500/bleach.jpg", s1: 366 },
                { id: 18, title: "Fullmetal Alchemist", tmdb: "31845", img: "https://image.tmdb.org/t/p/w500/fma.jpg", s1: 64 },
                { id: 19, title: "Chainsaw Man", tmdb: "114410", img: "https://image.tmdb.org/t/p/w500/cm.jpg", s1: 12 },
                { id: 20, title: "Spy x Family", tmdb: "120089", img: "https://image.tmdb.org/t/p/w500/sf.jpg", s1: 25 },
                { id: 21, title: "Naruto Shippuden", tmdb: "31911", img: "https://image.tmdb.org/t/p/w500/ns.jpg", s1: 500 },
                { id: 22, title: "Black Clover", tmdb: "73223", img: "https://image.tmdb.org/t/p/w500/bc.jpg", s1: 170 },
                { id: 23, title: "One Punch Man", tmdb: "63926", img: "https://image.tmdb.org/t/p/w500/opm.jpg", s1: 12, s2: 12 },
                { id: 24, title: "Death Note", tmdb: "13916", img: "https://image.tmdb.org/t/p/w500/dn.jpg", s1: 37 }
            ];

            let state = { active: database[0], ep: 1, szn: 's1', server: 'me' };

            const init = () => {
                renderGrid(database);
                setHero(database[0]);
                Auth.check();
            };

            const renderGrid = (list) => {
                document.getElementById('main-grid').innerHTML = list.map(item => `
                    <div class="anime-card" onclick="Engine.loadAnime(${item.id})">
                        <div class="dub-tag">DUB</div>
                        <div class="card-img"><img src="${item.img}" onerror="this.src='https://via.placeholder.com/200x300?text=${item.title}'"></div>
                        <div class="card-details">${item.title}</div>
                    </div>
                `).join('');
            };

            const setHero = (anime) => {
                state.active = anime;
                document.getElementById('hero-title').innerText = anime.title;
                document.getElementById('hero-banner').style.backgroundImage = `url('${anime.img}')`;
            };

            const loadAnime = (id) => {
                const anime = database.find(x => x.id === id);
                state.active = anime;
                state.ep = 1; state.szn = 's1';
                document.getElementById('hero-banner').style.display = "none";
                document.getElementById('watch-section').style.display = "block";
                document.getElementById('playing-title').innerText = anime.title;
                
                const p = document.getElementById('season-picker');
                p.innerHTML = `<option value="s1">Season 1</option>`;
                if(anime.s2) p.innerHTML += `<option value="s2">Season 2</option>`;
                if(anime.s3) p.innerHTML += `<option value="s3">Season 3</option>`;
                if(anime.s4) p.innerHTML += `<option value="s4">Season 4</option>`;

                renderEpisodes(anime.s1);
                updateStream(1);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };

            const renderEpisodes = (count) => {
                const grid = document.getElementById('ep-grid');
                grid.innerHTML = "";
                for(let i = 1; i <= count; i++) {
                    grid.innerHTML += `<div class="ep-item ${i===1?'active':''}" id="ep-link-${i}" onclick="Engine.updateStream(${i})">${i}</div>`;
                }
            };

            const updateStream = (ep) => {
                state.ep = ep;
                const iframe = document.getElementById('main-player');
                const sznNum = state.szn.replace('s', '');

                document.getElementById('playing-ep').innerText = "EPISODE " + ep + " [DUB]";
                document.querySelectorAll('.ep-item').forEach(el => el.classList.remove('active'));
                if(document.getElementById(`ep-link-${ep}`)) document.getElementById(`ep-link-${ep}`).classList.add('active');

                let finalUrl = "";
                const id = state.active.tmdb;

                // STABLE ROUTING ENGINE (Works on GitHub)
                if (state.server === 'me') {
                    finalUrl = `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${sznNum}&epi=${ep}&audio=en`;
                } else {
                    finalUrl = `https://vidsrc.cc/v2/embed/tv/${id}/${sznNum}/${ep}?audio=en`;
                }

                iframe.src = finalUrl;
            };

            const switchServer = (srv, el) => {
                state.server = srv;
                document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
                el.classList.add('active');
                updateStream(state.ep);
            };

            const search = () => {
                const q = document.getElementById('search-box').value.toLowerCase();
                renderGrid(database.filter(x => x.title.toLowerCase().includes(q)));
            };

            const changeSeason = () => {
                state.szn = document.getElementById('season-picker').value;
                renderEpisodes(state.active[state.szn]);
                updateStream(1);
            };

            return { init, loadAnime, updateStream, switchServer, search, changeSeason, startHero: () => loadAnime(state.active.id) };
        })();

        Engine.init();
    </script>
</body>
</html>
